<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Blueprint — Car Explorer</title>
<style>
  :root{
    --bg:#08182e; --bg2:#0a1f3a; --line:rgba(120,180,255,.14);
    --accent:#5fb0ff; --accent2:#8fd4ff; --ink:#dce9ff; --muted:#7e9bc4;
    --panel:rgba(10,28,52,.72); --edge:rgba(127,208,255,.28);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overflow:hidden}
  #scene{position:fixed;inset:0}
  /* blueprint grid overlay */
  body::before{content:"";position:fixed;inset:0;z-index:1;pointer-events:none;
    background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);
    background-size:42px 42px;mask-image:radial-gradient(ellipse at center,#000 55%,transparent 100%);opacity:.5}

  #load{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;z-index:60;background:var(--bg)}
  #load .ring{width:46px;height:46px;border:2px solid rgba(95,176,255,.22);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite}
  #load p{color:var(--muted);font:12px ui-monospace,monospace;letter-spacing:1px}
  @keyframes spin{to{transform:rotate(360deg)}}

  .topbar{position:fixed;top:14px;left:14px;right:14px;z-index:30;display:flex;align-items:center;gap:12px;pointer-events:none}
  .brand{display:flex;align-items:center;gap:9px;pointer-events:auto}
  .brand .mark{width:22px;height:22px;border:1.5px solid var(--accent);border-radius:5px;position:relative;box-shadow:0 0 12px rgba(95,176,255,.4)}
  .brand .mark::after{content:"";position:absolute;inset:4px;border:1px solid var(--edge);border-radius:2px}
  .brand h1{font:600 15px/1 -apple-system,sans-serif;letter-spacing:.5px}
  .brand small{color:var(--muted);font:11px ui-monospace,monospace;margin-left:4px}
  .spacer{flex:1}
  .tool{pointer-events:auto;display:flex;gap:8px;align-items:center}
  .tool label{font:11px ui-monospace,monospace;color:var(--muted)}
  .tool input[type=text]{background:rgba(4,14,28,.6);border:1px solid var(--edge);color:var(--ink);font:11px ui-monospace,monospace;padding:6px 9px;border-radius:8px;width:210px;outline:none}
  .btn{pointer-events:auto;background:rgba(4,14,28,.6);border:1px solid var(--edge);color:var(--accent2);font:600 11px ui-monospace,monospace;letter-spacing:.5px;padding:7px 12px;border-radius:8px;cursor:pointer}
  .btn:hover{border-color:var(--accent);box-shadow:0 0 12px rgba(95,176,255,.25)}
  #status{position:fixed;bottom:18px;left:18px;z-index:30;font:11px ui-monospace,monospace;color:var(--muted)}
  #status b{color:var(--accent2)}

  #labels{position:fixed;inset:0;pointer-events:none;z-index:20}
  .label{position:absolute;transform:translate(-50%,-50%);font:11px ui-monospace,monospace;letter-spacing:.5px;color:var(--accent2);
    background:rgba(6,18,36,.7);padding:3px 8px;border-radius:5px;border:1px solid var(--edge);white-space:nowrap}
  .label::before{content:"";position:absolute;left:-7px;top:50%;width:6px;height:1px;background:var(--accent)}

  /* drop hint */
  #drop{position:fixed;inset:0;z-index:55;display:none;align-items:center;justify-content:center;background:rgba(8,24,46,.82);
    border:2px dashed var(--accent);color:var(--accent2);font:600 16px ui-monospace,monospace;letter-spacing:1px}
  #drop.show{display:flex}

  /* orb */
  #orb{position:fixed;bottom:26px;right:26px;width:66px;height:66px;border-radius:50%;cursor:pointer;z-index:40;
    display:flex;align-items:center;justify-content:center;
    background:radial-gradient(circle at 50% 45%,rgba(95,176,255,.30),rgba(8,22,44,.92) 72%);
    border:1px solid var(--edge);box-shadow:0 0 26px rgba(95,176,255,.35),inset 0 0 20px rgba(95,176,255,.18);
    animation:breathe 3s ease-in-out infinite}
  #orb::before{content:"";position:absolute;inset:9px;border:1px solid rgba(143,212,255,.4);border-radius:50%}
  #orb::after{content:"";position:absolute;width:140%;height:1px;background:linear-gradient(90deg,transparent,rgba(95,176,255,.5),transparent)}
  #orb .core{width:15px;height:15px;border-radius:50%;background:#dcebff;background:radial-gradient(circle,#eaf4ff,#8fd4ff);box-shadow:0 0 14px #8fd4ff;z-index:1}
  @keyframes breathe{0%,100%{box-shadow:0 0 22px rgba(95,176,255,.3),inset 0 0 18px rgba(95,176,255,.16);transform:scale(1)}
    50%{box-shadow:0 0 40px rgba(95,176,255,.55),inset 0 0 22px rgba(95,176,255,.24);transform:scale(1.04)}}

  /* panel */
  #panel{position:fixed;bottom:26px;right:26px;width:392px;max-height:74vh;z-index:41;display:none;flex-direction:column;overflow:hidden;
    background:var(--panel);backdrop-filter:blur(16px);border:1px solid var(--edge);border-radius:18px;
    box-shadow:0 24px 70px rgba(0,0,0,.55),0 0 0 1px rgba(95,176,255,.06)}
  #panel.open{display:flex}
  .phead{display:flex;align-items:center;gap:10px;padding:15px 18px;border-bottom:1px solid rgba(127,208,255,.12);position:relative}
  .phead::after{content:"";position:absolute;left:18px;right:18px;bottom:-1px;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.4}
  .phead .node{width:11px;height:11px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent)}
  .phead h2{font:600 14px/1 -apple-system,sans-serif;flex:1;letter-spacing:.4px}
  .phead .x{color:var(--muted);cursor:pointer;font-size:18px;line-height:1}
  #log{padding:14px 16px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:10px}
  .msg{font-size:13.5px;line-height:1.5;padding:10px 13px;border-radius:12px;max-width:90%}
  .me{align-self:flex-end;background:rgba(95,176,255,.16);border:1px solid rgba(95,176,255,.22)}
  .bp{align-self:flex-start;background:rgba(255,255,255,.04);border:1px solid rgba(127,208,255,.12)}
  .acts{align-self:flex-start;font:11px ui-monospace,monospace;color:var(--muted)}
  .specs{align-self:flex-start;width:92%;background:rgba(95,176,255,.07);border:1px solid var(--edge);border-radius:12px;padding:11px 13px;font:12px ui-monospace,monospace}
  .specs b{color:var(--accent2);display:block;margin-bottom:6px;letter-spacing:.5px}
  .specs div{display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px dotted rgba(127,208,255,.12)}
  .specs span:last-child{color:var(--ink)}
  .chips{display:flex;flex-wrap:wrap;gap:7px;padding:0 16px 12px}
  .chip{font:12px -apple-system,sans-serif;color:var(--ink);background:rgba(95,176,255,.08);border:1px solid rgba(127,208,255,.2);padding:6px 11px;border-radius:18px;cursor:pointer}
  .chip:hover{border-color:var(--accent);box-shadow:0 0 10px rgba(95,176,255,.2)}
  .pin{display:flex;gap:8px;padding:12px 14px;border-top:1px solid rgba(127,208,255,.12)}
  .pin input{flex:1;background:rgba(4,14,28,.55);border:1px solid var(--edge);color:var(--ink);padding:11px 13px;border-radius:11px;font-size:13.5px;outline:none}
  .pin input:focus{border-color:var(--accent);box-shadow:0 0 12px rgba(95,176,255,.2)}
  .pin button{background:linear-gradient(180deg,#6fbcff,#3d86e6);color:#04122a;border:none;border-radius:11px;padding:0 16px;font-weight:700;cursor:pointer}
  .pin button:disabled{opacity:.5}
  input[type=file]{display:none}
</style>
</head>
<body>
  <div id="scene"></div>
  <div id="labels"></div>
  <div id="drop">drop a .glb car model to load</div>
  <div id="load"><div class="ring"></div><p id="loadtxt">LOADING MODEL…</p></div>

  <div class="topbar">
    <div class="brand">
      <div class="mark"></div><h1>Blueprint</h1><small id="modelname">GT3 RS</small>
    </div>
    <div class="spacer"></div>
    <div class="tool">
      <button class="btn" id="loadbtn">＋ LOAD MODEL</button>
      <input type="text" id="ep" value="http://localhost:8000" title="Agent endpoint" />
    </div>
  </div>
  <input type="file" id="file" accept=".glb,.gltf" />
  <div id="status">BLUEPRINT · <b id="st">loading</b> · drag orbit · scroll zoom</div>

  <div id="orb" title="Talk to Blueprint"><div class="core"></div></div>
  <div id="panel">
    <div class="phead"><div class="node"></div><h2>Blueprint</h2><div class="x" id="close">✕</div></div>
    <div id="log"><div class="msg bp">Ask me to show, explain, explode, isolate, or repaint any part of this car.</div></div>
    <div class="chips" id="chips"></div>
    <div class="pin"><input id="q" placeholder="Ask anything…" autocomplete="off" /><button id="send">Ask</button></div>
  </div>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const CONFIG = { modelSize:5, explodeFactor:0.5, focusZoom:2.2, sideZoom:1.8 };

// ── Generic part classifier — works with ANY model's node names ──────────────
// Maps whatever a GLB calls its parts → logical targets the AI uses. Add words
// here, never per-model code. Priority resolves overlaps (a brakelight is a
// light, not a brake; a steering wheel is interior, not a wheel).
const SYN = {
  lights:       ['headlight','tail_light','taillight','brakelight','lamp','_led','indicator','signal','drl','reverselight'],
  glass:        ['glass','window','windshield','windscreen','quarterglass'],
  interior:     ['seat','dash','steering','steer','shifter','pedal','console','doorpanel','gauge','cluster','cabin','cockpit','armrest','needle','tacho'],
  brakes:       ['brakedisc','brake_disc','brakes','caliper','rotor','brakeline','brakepad','disc_','disc.'],
  wheels:       ['wheel','tyre','tire',' rim','_rim','alloy'],
  suspension:   ['suspension','coilover','damper','shock','spring','strut','wishbone','lowerarm','upperarm','controlarm','swaybar','antiroll','anti_roll','pushrod','tierod','trailingarm','subframe','knuckle','hub_','steeringbox'],
  transmission: ['transmission','gearbox','transaxle','clutch','differential','diff_','driveshaft','propshaft','halfshaft'],
  cooling:      ['radiator','coolant','intercooler','heatshield'],
  fuel:         ['fueltank','fuelline','fuelpump','fuel_'],
  exhaust:      ['exhaust','muffler','tailpipe','catalytic','downpipe','header_','exhausttip'],
  engine:       ['engine','motor','powerplant','powerunit','cylinder','boxer','flat6','flat-6','intake','manifold','crank','piston','block_'],
  rear_wing:    ['carbon_wing','rear_wing','wing','spoiler','diffuser','splitter','canard','aero'],
  doors:        ['door_l','door_r','door.','_door','frontdoor','reardoor'],
  body:         ['body','chassis','shell','fender','door','hood','bonnet','bumper','trunk','boot','tailgate','sideskirt','skirt','mirror','roof','fascia','quarter','pillar','sill','panel','underbody','leg'],
};
const PRIORITY = ['lights','glass','interior','brakes','wheels','suspension','transmission','cooling','fuel','exhaust','engine','rear_wing','doors','body'];
let PARTS = {};   // category -> [nodes], built per model

function classify(partNodes){
  const map = {}; PRIORITY.forEach(c=>map[c]=[]);
  partNodes.forEach(n=>{
    const name = n.name.toLowerCase();
    for(const cat of PRIORITY){ if(SYN[cat].some(k=>name.includes(k))){ map[cat].push(n); break; } }
  });
  return map;
}

// ── Three.js setup ───────────────────────────────────────────────────────────
const mount = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth, innerHeight); renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.outputColorSpace = THREE.SRGBColorSpace;
mount.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color('#08182e');
scene.fog = new THREE.Fog('#08182e', 16, 40);
const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.05, 1000);
camera.position.set(6,3,8);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; controls.dampingFactor = 0.1;
controls.addEventListener('start', ()=>{ camAnimating = false; });

scene.add(new THREE.HemisphereLight('#bcd6ff','#162038', 1.05));
const key = new THREE.DirectionalLight('#eaf3ff', 1.9); key.position.set(6,9,6); scene.add(key);
const fill = new THREE.DirectionalLight('#7fb6ff', 0.7); fill.position.set(-6,4,-5); scene.add(fill);
function addGrid(){ const g=new THREE.GridHelper(60,60,0x2f5e9e,0x16304f); g.position.y=-0.01; scene.add(g); }

// ── State ────────────────────────────────────────────────────────────────────
let modelGroup=null, partNodes=[], modelCenter=new THREE.Vector3();
let orient={front:new THREE.Vector3(0,0,1),right:new THREE.Vector3(1,0,0),up:new THREE.Vector3(0,1,0)};
const explodedMovers=new Set(), highlighted=new Set();
let camGoalPos=camera.position.clone(), camGoalTgt=new THREE.Vector3(), camAnimating=false;
const loader=new GLTFLoader();

// ── Load any model ───────────────────────────────────────────────────────────
function loadModel(url, label){
  document.getElementById('load').style.display='flex';
  document.getElementById('loadtxt').textContent='LOADING MODEL…';
  loader.load(url, gltf=>{
    if(modelGroup){ scene.remove(modelGroup); }
    const model=gltf.scene; modelGroup=model;
    let box=new THREE.Box3().setFromObject(model);
    const size=box.getSize(new THREE.Vector3()), center=box.getCenter(new THREE.Vector3());
    const s=CONFIG.modelSize/Math.max(size.x,size.y,size.z);
    model.scale.setScalar(s); model.position.sub(center.multiplyScalar(s));
    scene.add(model);
    box=new THREE.Box3().setFromObject(model); modelCenter=box.getCenter(new THREE.Vector3());

    const root=model.getObjectByName('RootNode')||biggestGroup(model);
    partNodes=root.children.filter(c=>!/_0$/.test(c.name));
    if(partNodes.length<3) partNodes=collectParts(model); // fallback for flat hierarchies
    PARTS=classify(partNodes);

    model.updateMatrixWorld(true);
    const radius=box.getSize(new THREE.Vector3()).length()/2, D=radius*CONFIG.explodeFactor;
    partNodes.forEach(p=>{
      p.userData.home=p.position.clone();
      const c=new THREE.Box3().setFromObject(p).getCenter(new THREE.Vector3());
      const dir=c.clone().sub(modelCenter); dir.y*=0.55; if(dir.lengthSq()<1e-6) dir.set(0,1,0); dir.normalize();
      const par=p.parent, a=par.worldToLocal(c.clone()), b=par.worldToLocal(c.clone().addScaledVector(dir,D));
      p.userData.boom=p.userData.home.clone().add(b.sub(a));
    });
    orient=computeOrientation();
    document.getElementById('load').style.display='none';
    if(label) document.getElementById('modelname').textContent=label;
    st.textContent='idle';
    AtlasScene.focus_camera({target:'whole_car'});
  }, e=>{ if(e.total) document.getElementById('loadtxt').textContent=`LOADING… ${Math.round(e.loaded/e.total*100)}%`; },
     err=>{ document.getElementById('loadtxt').textContent='Model failed to load — serve over http (see README).'; console.error(err); });
}
function biggestGroup(m){ let best=m,n=0; m.traverse(o=>{ if(o.children.length>n){n=o.children.length;best=o;} }); return best; }
function collectParts(m){ const out=[]; m.traverse(o=>{ if(o.isMesh && o.parent) out.push(o); }); return out; }

addGrid();
const params=new URLSearchParams(location.search);
const startModel=params.get('model') ? `./models/${params.get('model')}` : './models/gt3rs.glb';
loadModel(startModel, params.get('model') ? params.get('model').replace(/\.glb$/i,'') : 'GT3 RS');

// model loader UI (button + drag-drop)
document.getElementById('loadbtn').onclick=()=>document.getElementById('file').click();
document.getElementById('file').onchange=e=>{ const f=e.target.files[0]; if(f) loadModel(URL.createObjectURL(f), f.name.replace(/\.(glb|gltf)$/i,'')); };
const dropEl=document.getElementById('drop');
addEventListener('dragover',e=>{e.preventDefault();dropEl.classList.add('show');});
addEventListener('dragleave',e=>{ if(e.clientX===0&&e.clientY===0) dropEl.classList.remove('show'); });
addEventListener('drop',e=>{ e.preventDefault();dropEl.classList.remove('show');
  const f=[...e.dataTransfer.files].find(f=>/\.(glb|gltf)$/i.test(f.name)); if(f) loadModel(URL.createObjectURL(f), f.name.replace(/\.(glb|gltf)$/i,'')); });

// ── Orientation (front/right) from part centroids, with fallback ─────────────
function centerOf(kw){ const p=partNodes.find(n=>n.name.toLowerCase().includes(kw)); return p?new THREE.Box3().setFromObject(p).getCenter(new THREE.Vector3()):null; }
function computeOrientation(){
  const bf=centerOf('bumper_f')||centerOf('frontbumper'), br=centerOf('bumper_r')||centerOf('rearbumper');
  const dl=centerOf('door_l')||centerOf('mirror_l'), dr=centerOf('door_r')||centerOf('mirror_r');
  const front=(bf&&br)?bf.clone().sub(br).setY(0).normalize():new THREE.Vector3(0,0,1);
  const right=(dl&&dr)?dr.clone().sub(dl).setY(0).normalize():new THREE.Vector3(1,0,0);
  return { front, right, up:new THREE.Vector3(0,1,0) };
}

// ── Lookups ──────────────────────────────────────────────────────────────────
function nodesFor(t){ if(t==='whole_car') return partNodes; return PARTS[t]||[]; }
function meshesUnder(nodes){ const o=[]; nodes.forEach(n=>n.traverse(m=>{ if(m.isMesh) o.push(m); })); return o; }
function boxOf(nodes){ const b=new THREE.Box3(); nodes.forEach(n=>b.union(new THREE.Box3().setFromObject(n))); return b; }

// ── BlueprintScene: the API the Flutter bridge also calls ────────────────────
const NAMED={'nardo grey':'#6E7479','nardo gray':'#6E7479','gunmetal':'#3a3f44','racing green':'#13452a','guards red':'#c0121c','blueprint blue':'#1e64b4'};
function resolveColor(c){ const k=(c||'').toLowerCase(); if(NAMED[k]) return NAMED[k]; try{ return new THREE.Color(c).getStyle(); }catch{ return '#5fb0ff'; } }

const AtlasScene = {
  focus_camera({target}){
    if(!partNodes.length) return; camAnimating=true;
    const dirset={front:1,rear:1,left:1,right:1,top:1};
    if(dirset[target]||target==='whole_car'){
      const b=boxOf(partNodes),c=b.getCenter(new THREE.Vector3()),r=b.getSize(new THREE.Vector3()).length()/2;
      const {front,right,up}=orient; let dir;
      if(target==='front') dir=front.clone().addScaledVector(up,.35);
      else if(target==='rear') dir=front.clone().negate().addScaledVector(up,.35);
      else if(target==='left') dir=right.clone().negate().addScaledVector(up,.3);
      else if(target==='right') dir=right.clone().addScaledVector(up,.3);
      else if(target==='top') dir=up.clone().addScaledVector(front,.2);
      else dir=front.clone().multiplyScalar(.8).addScaledVector(right,.8).addScaledVector(up,.6);
      camGoalTgt.copy(c); camGoalPos.copy(c).addScaledVector(dir.normalize(), r*CONFIG.sideZoom); return;
    }
    const nodes=nodesFor(target); if(!nodes.length){ AtlasScene.focus_camera({target:'whole_car'}); return; }
    const b=boxOf(nodes),c=b.getCenter(new THREE.Vector3()),r=Math.max(b.getSize(new THREE.Vector3()).length()/2,.4);
    const {front,right,up}=orient; const dir=front.clone().multiplyScalar(.7).addScaledVector(right,.7).addScaledVector(up,.5).normalize();
    camGoalTgt.copy(c); camGoalPos.copy(c).addScaledVector(dir, r*CONFIG.focusZoom);
  },
  highlight({target}){
    const meshes=meshesUnder(nodesFor(target));
    meshes.forEach(m=>{ if(!m.userData.origMat){ m.userData.origMat=m.material; m.material=m.material.clone(); } highlighted.add(m); });
    setTimeout(()=>clearHighlight(meshes),5000);
  },
  explode({target}){ nodesFor(target).forEach(n=>explodedMovers.add(n)); },
  isolate({target}){ const keep=new Set(nodesFor(target)); if(!keep.size) return; partNodes.forEach(n=>n.visible=keep.has(n)); },
  reset_view(){ explodedMovers.clear(); partNodes.forEach(n=>n.visible=true); clearHighlight([...highlighted]); AtlasScene.focus_camera({target:'whole_car'}); },
  show_labels({target}){ labelsTarget=target||'whole_car'; setTimeout(()=>labelsTarget=null,6000); },
  show_specs(){},
  set_paint({color}){
    const c=resolveColor(color); let n=0;
    const bodyMeshes = meshesUnder(PARTS.body||[]);
    const exclude=/glass|chrome|black|window|light|tyre|tire|rubber|carbon|grille|vent|plastic/;
    scene.traverse(o=>{
      if(!o.isMesh) return;
      const named = o.name.toLowerCase().includes('paint');
      const isBody = bodyMeshes.includes(o) && !exclude.test(o.name.toLowerCase());
      if(named || isBody){ if(!o.userData.paintMat){ o.userData.paintMat=o.material; o.material=o.material.clone(); } o.material.color.set(c); n++; }
    });
    if(!n) console.warn('no paintable meshes found');
  },
};
function clearHighlight(meshes){ meshes.forEach(m=>{ if(m.userData.origMat){ m.material.dispose&&m.material.dispose(); m.material=m.userData.origMat; m.userData.origMat=null; } highlighted.delete(m); }); }
window.BlueprintScene = AtlasScene; // exposed for the Flutter WebView bridge

// ── Executor ─────────────────────────────────────────────────────────────────
const executor={h:{},reg(n,f){this.h[n]=f;return this;},
  async run(actions){ for(const a of actions){ const fn=this.h[a.tool]; if(!fn){ console.warn('no handler',a.tool); continue; } await fn(a.args||{}); await sleep(500); } }};
['focus_camera','highlight','explode','isolate','reset_view','show_labels','show_specs','set_paint'].forEach(n=>executor.reg(n,AtlasScene[n]));

// ── Agent chat ───────────────────────────────────────────────────────────────
const $=s=>document.querySelector(s), log=$('#log'), st=$('#st'); let busy=false;
async function ask(text){
  if(busy||!text.trim()) return; busy=true; $('#send').disabled=true; st.textContent='thinking…'; bubble('me',text);
  try{
    const res=await fetch($('#ep').value.trim(),{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message:text,context:{car:'911 GT3 RS'}})});
    if(!res.ok) throw new Error(res.status+' '+await res.text());
    const data=await res.json();
    if(data.actions?.length) bubble('acts', data.actions.map(a=>`${a.tool}(${Object.values(a.args||{}).join(',')})`).join('  →  '));
    if(data.speech) bubble('bp', data.speech);
    renderSpecs(data.data); await executor.run(data.actions||[]); st.textContent='idle';
  }catch(err){ bubble('bp','⚠️ '+err.message+' — is the agent running on '+$('#ep').value+'?'); st.textContent='error'; }
  busy=false; $('#send').disabled=false; $('#q').focus();
}
function bubble(cls,text){ const d=document.createElement('div'); d.className='msg '+cls; d.textContent=text; log.appendChild(d); log.scrollTop=log.scrollHeight; }
function renderSpecs(data){
  const info=data&&data.get_part_facts; if(!info||info.found===false||!info.facts) return;
  const d=document.createElement('div'); d.className='specs';
  d.innerHTML=`<b>${String(info.part||'').toUpperCase()} — ${info.car||''}</b>`+Object.entries(info.facts).map(([k,v])=>`<div><span>${k}</span><span>${v}</span></div>`).join('');
  log.appendChild(d); log.scrollTop=log.scrollHeight;
}
['Show me the engine','Explain the suspension','Explode the whole car','Isolate the brakes','Paint it Nardo Grey','Reset view']
  .forEach(s=>{ const c=document.createElement('div'); c.className='chip'; c.textContent=s; c.onclick=()=>{ openPanel(); ask(s); }; $('#chips').appendChild(c); });
function openPanel(){ $('#panel').classList.add('open'); $('#orb').style.display='none'; $('#q').focus(); }
$('#orb').onclick=openPanel;
$('#close').onclick=()=>{ $('#panel').classList.remove('open'); $('#orb').style.display='flex'; };
$('#send').onclick=()=>{ const v=$('#q').value; $('#q').value=''; ask(v); };
$('#q').addEventListener('keydown',e=>{ if(e.key==='Enter'){ const v=$('#q').value; $('#q').value=''; ask(v); } });

// ── Render loop ──────────────────────────────────────────────────────────────
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
let labelsTarget=null; const labelEl=$('#labels');
function tick(t){
  if(camAnimating){ camera.position.lerp(camGoalPos,.10); controls.target.lerp(camGoalTgt,.10); if(camera.position.distanceTo(camGoalPos)<.05) camAnimating=false; }
  controls.update();
  partNodes.forEach(p=>{ const g=explodedMovers.has(p)?p.userData.boom:p.userData.home; if(g) p.position.lerp(g,.12); });
  const glow=.35+.3*Math.sin(t*.006);
  highlighted.forEach(m=>{ if(m.material.emissive) m.material.emissive.setRGB(glow*.15, glow*.55, glow*1.0); }); // cyan glow
  drawLabels();
  renderer.render(scene,camera); requestAnimationFrame(tick);
}
function drawLabels(){
  labelEl.innerHTML=''; if(!labelsTarget||!partNodes.length) return;
  const groups=labelsTarget==='whole_car'?PRIORITY.filter(c=>(PARTS[c]||[]).length):[labelsTarget];
  groups.forEach(g=>{ const nodes=nodesFor(g); if(!nodes.length) return;
    const c=boxOf(nodes).getCenter(new THREE.Vector3()).project(camera); if(c.z>1) return;
    const el=document.createElement('div'); el.className='label'; el.textContent=g.replace('_',' ');
    el.style.left=((c.x*.5+.5)*innerWidth)+'px'; el.style.top=((-c.y*.5+.5)*innerHeight)+'px'; labelEl.appendChild(el); });
}
addEventListener('resize',()=>{ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); });
requestAnimationFrame(tick);
</script>
