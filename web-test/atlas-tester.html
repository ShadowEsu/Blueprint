<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Atlas AI — Test Harness</title>
<style>
  :root { --bg:#0a0d11; --gold:#d9b540; --panel:rgba(20,24,30,0.86); --text:#f3f5f8; --muted:#8b94a0; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; }
  body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; overflow:hidden; }
  #scene { position:fixed; inset:0; }

  /* status pill */
  #status { position:fixed; top:14px; left:14px; font-size:12px; color:var(--muted);
    background:rgba(0,0,0,0.35); padding:6px 12px; border-radius:20px; z-index:30; }
  #status b { color:var(--gold); }
  #endpoint { position:fixed; top:14px; right:14px; z-index:30; display:flex; gap:6px; align-items:center; }
  #endpoint input { background:rgba(0,0,0,0.4); border:1px solid #2a2f37; color:var(--text);
    font-size:11px; padding:6px 9px; border-radius:8px; width:230px; }

  /* labels overlay */
  #labels { position:fixed; inset:0; pointer-events:none; z-index:20; }
  .label { position:absolute; transform:translate(-50%,-50%); font-size:11px; letter-spacing:.5px;
    color:var(--gold); background:rgba(0,0,0,0.55); padding:3px 8px; border-radius:6px; border:1px solid rgba(217,181,64,.4); white-space:nowrap; }

  /* AI orb */
  #orb { position:fixed; bottom:26px; right:26px; width:64px; height:64px; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #ffe89a, var(--gold) 55%, #8a6f1f);
    box-shadow:0 0 0 0 rgba(217,181,64,.55); cursor:pointer; z-index:40;
    display:flex; align-items:center; justify-content:center; animation:pulse 2.6s infinite ease-in-out; }
  #orb span { font-size:26px; }
  @keyframes pulse { 0%,100%{ box-shadow:0 0 0 0 rgba(217,181,64,.5); transform:scale(1);} 50%{ box-shadow:0 0 0 16px rgba(217,181,64,0); transform:scale(1.05);} }

  /* panel */
  #panel { position:fixed; bottom:26px; right:26px; width:380px; max-height:72vh; z-index:41;
    background:var(--panel); backdrop-filter:blur(14px); border:1px solid rgba(217,181,64,.25);
    border-radius:20px; display:none; flex-direction:column; overflow:hidden; box-shadow:0 20px 60px rgba(0,0,0,.5); }
  #panel.open { display:flex; }
  .head { display:flex; align-items:center; gap:10px; padding:16px 18px; border-bottom:1px solid rgba(255,255,255,.06); }
  .head .dot { width:10px; height:10px; border-radius:50%; background:var(--gold); box-shadow:0 0 10px var(--gold); }
  .head h1 { font-size:15px; font-weight:600; flex:1; }
  .head .x { color:var(--muted); cursor:pointer; font-size:18px; line-height:1; }
  #log { padding:14px 16px; overflow-y:auto; flex:1; display:flex; flex-direction:column; gap:10px; }
  .msg { font-size:13.5px; line-height:1.5; padding:10px 13px; border-radius:13px; max-width:90%; }
  .me { align-self:flex-end; background:#23304a; }
  .atlas { align-self:flex-start; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.06); }
  .acts { align-self:flex-start; font-size:11px; color:var(--muted); font-family:ui-monospace,monospace; }
  .specs { align-self:flex-start; background:rgba(217,181,64,.08); border:1px solid rgba(217,181,64,.25);
    border-radius:12px; padding:10px 13px; font-size:12px; width:90%; }
  .specs b { color:var(--gold); } .specs div { display:flex; justify-content:space-between; padding:2px 0; }
  .chips { display:flex; flex-wrap:wrap; gap:7px; padding:0 16px 12px; }
  .chip { font-size:12px; color:var(--text); background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1);
    padding:6px 11px; border-radius:20px; cursor:pointer; } .chip:hover { border-color:var(--gold); }
  .input { display:flex; gap:8px; padding:12px 14px; border-top:1px solid rgba(255,255,255,.06); }
  .input input { flex:1; background:rgba(0,0,0,.35); border:1px solid #2a2f37; color:var(--text);
    padding:11px 13px; border-radius:12px; font-size:13.5px; outline:none; }
  .input input:focus { border-color:var(--gold); }
  .input button { background:var(--gold); color:#1a1407; border:none; border-radius:12px; padding:0 16px;
    font-weight:600; cursor:pointer; } .input button:disabled { opacity:.5; cursor:default; }
</style>
</head>
<body>
  <div id="scene"></div>
  <div id="labels"></div>
  <div id="status">Atlas: <b id="st">idle</b> · drag to orbit · scroll to zoom</div>
  <div id="endpoint">
    <input id="ep" value="http://localhost:8000" title="Agent endpoint" />
  </div>

  <div id="orb" title="Talk to Atlas"><span>◉</span></div>

  <div id="panel">
    <div class="head"><div class="dot"></div><h1>Atlas AI</h1><div class="x" id="close">✕</div></div>
    <div id="log">
      <div class="msg atlas">Good afternoon. Ask me to show, explain, explode, or repaint a part.</div>
    </div>
    <div class="chips" id="chips"></div>
    <div class="input">
      <input id="q" placeholder="Ask anything…" autocomplete="off" />
      <button id="send">Ask</button>
    </div>
  </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─────────────────────────────────────────────────────────────────────────────
// 1) Build a simple, named 3D car. Each named part can be focused / highlighted
//    / exploded / (body) repainted — exactly the actions the agent emits.
// ─────────────────────────────────────────────────────────────────────────────
const mount = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
mount.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color('#0a0d11');
scene.fog = new THREE.Fog('#0a0d11', 14, 30);

const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 100);

scene.add(new THREE.AmbientLight('#ffffff', 0.45));
const key = new THREE.DirectionalLight('#fff7e0', 1.1); key.position.set(5,8,6); scene.add(key);
const rim = new THREE.DirectionalLight('#9fd0ff', 0.5); rim.position.set(-6,3,-4); scene.add(rim);
// ground grid
scene.add(new THREE.GridHelper(40, 40, 0x1b2230, 0x141a22));

const car = new THREE.Group(); scene.add(car);
const mk = (geo, color, x,y,z, name) => {
  const m = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color, metalness:.4, roughness:.5 }));
  m.position.set(x,y,z); m.name = name||''; car.add(m); return m;
};

// body (paintable), cabin, engine (rear, -x), rear wing, 4 wheels + brake discs, suspension struts
const body = mk(new THREE.BoxGeometry(4.6,0.7,2.0), '#c0392b', 0, 0.55, 0, 'body');
const nose = mk(new THREE.BoxGeometry(1.0,0.45,1.8), '#c0392b', 2.4, 0.5, 0, 'body2');
const cabin = mk(new THREE.BoxGeometry(2.0,0.7,1.7), '#1a2230', -0.2, 1.05, 0, 'cabin');
const engine = mk(new THREE.BoxGeometry(1.1,0.6,1.5), '#6b7177', -1.9, 0.7, 0, 'engine');
const wing = mk(new THREE.BoxGeometry(0.25,0.08,2.0), '#2a2f37', -2.25, 1.35, 0, 'rear_wing');
const wingL = mk(new THREE.BoxGeometry(0.12,0.5,0.1), '#2a2f37', -2.15, 1.05, 0.8, 'rear_wing');
const wingR = mk(new THREE.BoxGeometry(0.12,0.5,0.1), '#2a2f37', -2.15, 1.05, -0.8, 'rear_wing');

const wheels = [], brakes = [], susp = [];
const wheelGeo = new THREE.CylinderGeometry(0.55,0.55,0.4,22);
const discGeo  = new THREE.CylinderGeometry(0.34,0.34,0.06,20);
const strutGeo = new THREE.BoxGeometry(0.1,0.5,0.1);
[[1.5,0.9],[1.5,-0.9],[-1.5,0.9],[-1.5,-0.9]].forEach(([x,z],i)=>{
  const w = mk(wheelGeo.clone(), '#15181d', x,0.55,z, 'wheel'); w.rotation.x = Math.PI/2; wheels.push(w);
  const d = mk(discGeo.clone(), '#9aa0a6', x,0.55,z*0.86, 'brake'); d.rotation.x = Math.PI/2; brakes.push(d);
  const s = mk(strutGeo.clone(), '#3a4049', x,0.85,z*0.7, 'suspension'); susp.push(s);
});

// store original positions so reset / explode work
car.traverse(o => { if (o.isMesh) o.userData.home = o.position.clone(); });

// logical part groups the agent targets
const PAINTABLE = [body, nose];
const PARTS = {
  engine:[engine], cabin:[cabin], interior:[cabin], body:[body,nose],
  rear_wing:[wing,wingL,wingR], wheels, brakes, suspension:susp,
  whole_car: [], // filled below
};
car.traverse(o => { if (o.isMesh) PARTS.whole_car.push(o); });

// explode direction per mesh (outward-ish)
car.traverse(o => {
  if (!o.isMesh) return;
  const p = o.userData.home;
  o.userData.boom = new THREE.Vector3(Math.sign(p.x||0.01)*0.6, 0.8, Math.sign(p.z||0.01)*0.9);
});

// ─────────────────────────────────────────────────────────────────────────────
// 2) Camera: simple manual orbit + smooth AI-driven focus presets.
// ─────────────────────────────────────────────────────────────────────────────
const cam = { theta:0.7, phi:1.05, r:11 };          // current
const target = { ...cam };                            // where we're easing to
const LOOK = new THREE.Vector3(0,0.6,0);
const FOCUS = {
  whole_car:{theta:0.7,phi:1.05,r:11}, front:{theta:Math.PI/2,phi:1.2,r:8.5},
  rear:{theta:-Math.PI/2,phi:1.15,r:8.5}, left:{theta:0,phi:1.15,r:9}, right:{theta:Math.PI,phi:1.15,r:9},
  engine:{theta:-1.1,phi:1.25,r:7}, wheels:{theta:0.8,phi:1.45,r:7.5},
  rear_wing:{theta:-2.0,phi:0.9,r:7}, brakes:{theta:0.8,phi:1.4,r:7}, suspension:{theta:0.6,phi:1.3,r:7.5},
  interior:{theta:0.6,phi:0.85,r:6}, cabin:{theta:0.6,phi:0.85,r:6},
};
function applyCam(){
  const sp = Math.sin(cam.phi), cp = Math.cos(cam.phi);
  camera.position.set(cam.r*sp*Math.sin(cam.theta), Math.max(0.5,cam.r*cp), cam.r*sp*Math.cos(cam.theta));
  camera.lookAt(LOOK);
}
// drag to orbit
let drag=false, lx=0, ly=0;
renderer.domElement.addEventListener('pointerdown', e=>{drag=true;lx=e.clientX;ly=e.clientY;});
addEventListener('pointerup', ()=>drag=false);
addEventListener('pointermove', e=>{
  if(!drag) return;
  target.theta -= (e.clientX-lx)*0.01; target.phi = Math.min(1.5,Math.max(0.3,target.phi-(e.clientY-ly)*0.01));
  cam.theta=target.theta; cam.phi=target.phi; lx=e.clientX; ly=e.clientY;
});
renderer.domElement.addEventListener('wheel', e=>{ target.r = Math.min(20,Math.max(4,target.r+e.deltaY*0.01)); e.preventDefault(); }, {passive:false});

// ─────────────────────────────────────────────────────────────────────────────
// 3) AtlasScene — the exact API your Three.js viewer should expose to Flutter.
//    The ActionExecutor below maps each agent action to one of these methods.
// ─────────────────────────────────────────────────────────────────────────────
let exploded = new Set();
const NAMED_COLORS = { 'nardo grey':'#6E7479','nardo gray':'#6E7479','gunmetal':'#3a3f44','racing green':'#13452a' };
function resolveColor(c){ const k=(c||'').toLowerCase(); if(NAMED_COLORS[k]) return NAMED_COLORS[k]; try{ return new THREE.Color(c).getStyle(); }catch{ return '#c0392b'; } }

const AtlasScene = {
  focus_camera({target:t}){ const f=FOCUS[t]||FOCUS.whole_car; Object.assign(target,f); },
  highlight({target:t}){ (PARTS[t]||[]).forEach(m=>{ m.userData.glow=true; }); setTimeout(()=>{ (PARTS[t]||[]).forEach(m=>m.userData.glow=false); }, 4000); },
  explode({target:t}){ const set=(t==='whole_car')?PARTS.whole_car:(PARTS[t]||[]); set.forEach(m=>exploded.add(m)); },
  reset_view(){ exploded.clear(); car.traverse(o=>{ if(o.isMesh) o.userData.glow=false; }); Object.assign(target,FOCUS.whole_car); },
  show_labels({target:t}){ labelsOn = (t&&PARTS[t])? t : 'all'; setTimeout(()=>labelsOn=null, 6000); },
  show_specs(){ /* card is rendered from response.data in the chat (see renderSpecs) */ },
  set_paint({color}){ const c=resolveColor(color); PAINTABLE.forEach(m=>m.material.color.set(c)); },
};

// ─────────────────────────────────────────────────────────────────────────────
// 4) ActionExecutor — client twin of the server's tool registry.
//    Add a new scene action? register one handler here. (Mirrors atlas_agent.dart)
// ─────────────────────────────────────────────────────────────────────────────
const executor = {
  handlers:{},
  register(name, fn){ this.handlers[name]=fn; return this; },
  async run(actions){ for(const a of actions){ const h=this.handlers[a.tool]; if(!h){ console.warn('no handler:', a.tool); continue; } await h(a.args||{}); await sleep(450); } }
};
['focus_camera','highlight','explode','reset_view','show_labels','show_specs','set_paint']
  .forEach(n => executor.register(n, AtlasScene[n]));

// ─────────────────────────────────────────────────────────────────────────────
// 5) Talk to the agent.
// ─────────────────────────────────────────────────────────────────────────────
const $ = s => document.querySelector(s);
const log = $('#log'), st = $('#st');
let busy=false;
async function ask(text){
  if(busy || !text.trim()) return; busy=true; $('#send').disabled=true; st.textContent='thinking…';
  bubble('me', text);
  try{
    const res = await fetch($('#ep').value.trim(), {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ message:text, context:{ carId:'demo-gt' } })
    });
    if(!res.ok) throw new Error(res.status+' '+await res.text());
    const data = await res.json();
    if(data.actions?.length){ bubble('acts', data.actions.map(a=>`${a.tool}(${Object.values(a.args||{}).join(',')})`).join('  →  ')); }
    if(data.speech) bubble('atlas', data.speech);
    renderSpecs(data.data);
    await executor.run(data.actions||[]);
    st.textContent='idle';
  }catch(err){ bubble('atlas','⚠️ '+err.message+'  — is the agent running on '+$('#ep').value+' ?'); st.textContent='error'; }
  busy=false; $('#send').disabled=false; $('#q').focus();
}
function bubble(cls, text){ const d=document.createElement('div'); d.className='msg '+cls; d.textContent=text; log.appendChild(d); log.scrollTop=log.scrollHeight; }
function renderSpecs(data){
  if(!data) return;
  const info = data.get_part_info; if(!info || info.found===false || !info.specs) return;
  const d=document.createElement('div'); d.className='specs';
  d.innerHTML = `<b>${(info.name||'').toUpperCase()}</b>` + Object.entries(info.specs).map(([k,v])=>`<div><span>${k}</span><span>${v}</span></div>`).join('');
  log.appendChild(d); log.scrollTop=log.scrollHeight;
}

// suggestion chips
const SUGGEST = ['Show me the engine','Explain the rear wing','Explode the whole car','Paint it Nardo Grey','Show the brakes','Reset view'];
const chips=$('#chips'); SUGGEST.forEach(s=>{ const c=document.createElement('div'); c.className='chip'; c.textContent=s; c.onclick=()=>{ openPanel(); ask(s); }; chips.appendChild(c); });

// panel open/close
function openPanel(){ $('#panel').classList.add('open'); $('#orb').style.display='none'; $('#q').focus(); }
$('#orb').onclick=openPanel;
$('#close').onclick=()=>{ $('#panel').classList.remove('open'); $('#orb').style.display='flex'; };
$('#send').onclick=()=>{ const v=$('#q').value; $('#q').value=''; ask(v); };
$('#q').addEventListener('keydown', e=>{ if(e.key==='Enter'){ const v=$('#q').value; $('#q').value=''; ask(v); } });

// ─────────────────────────────────────────────────────────────────────────────
// 6) Render loop: ease camera, animate explode, pulse highlights, project labels.
// ─────────────────────────────────────────────────────────────────────────────
let labelsOn=null; const labelEl=$('#labels');
const sleep = ms => new Promise(r=>setTimeout(r,ms));
function tick(t){
  cam.theta += (target.theta-cam.theta)*0.12; cam.phi += (target.phi-cam.phi)*0.12; cam.r += (target.r-cam.r)*0.12;
  applyCam();
  car.traverse(o=>{
    if(!o.isMesh) return;
    const home=o.userData.home, want = exploded.has(o)? home.clone().add(o.userData.boom) : home;
    o.position.lerp(want, 0.15);
    const glow = o.userData.glow ? (0.4+0.3*Math.sin(t*0.006)) : 0;
    o.material.emissive ? o.material.emissive.setRGB(glow*0.85, glow*0.7, glow*0.15) : null;
  });
  drawLabels();
  renderer.render(scene, camera); requestAnimationFrame(tick);
}
function drawLabels(){
  labelEl.innerHTML='';
  if(!labelsOn) return;
  const groups = labelsOn==='all' ? ['engine','rear_wing','wheels','brakes','cabin'] : [labelsOn];
  groups.forEach(g=>{ const m=(PARTS[g]||[])[0]; if(!m) return;
    const v=m.getWorldPosition(new THREE.Vector3()).project(camera);
    if(v.z>1) return;
    const el=document.createElement('div'); el.className='label'; el.textContent=g.replace('_',' ');
    el.style.left=((v.x*0.5+0.5)*innerWidth)+'px'; el.style.top=((-v.y*0.5+0.5)*innerHeight)+'px';
    labelEl.appendChild(el);
  });
}
addEventListener('resize', ()=>{ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); });
applyCam(); requestAnimationFrame(tick);
</script>
</body>
</html>
